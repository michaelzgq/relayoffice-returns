previews:
  generation: off

services:
  - type: pserv
    name: relayoffice-mysql
    env: docker
    dockerContext: ./docker/mysql
    dockerfilePath: ./docker/mysql/Dockerfile
    autoDeploy: false
    plan: starter
    region: oregon
    envVars:
      - key: MYSQL_DATABASE
        value: relayoffice
      - key: MYSQL_USER
        value: relayoffice
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: web
    name: relayoffice-returns-app
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: ./web-panel
    dockerfilePath: ./web-panel/Dockerfile.render
    healthCheckPath: /healthz
    preDeployCommand: /usr/local/bin/render-predeploy.sh
    domains:
      - dossentry.com
      - demo.dossentry.com
    envVars:
      - key: APP_NAME
        value: Dossentry
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DEBUGBAR_ENABLED
        value: "false"
      - key: APP_MODE
        value: live
      - key: FORCE_HTTPS
        value: "true"
      - key: APP_URL
        value: https://demo.dossentry.com
      - key: WORKFLOW_REVIEW_NOTIFICATION_EMAIL
        value: michael.zgq@gmail.com
      - key: APP_KEY_BASE64
        generateValue: true
      - key: LOG_CHANNEL
        value: stack
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: solutionsoscommerce@gmail.com
      - key: MAIL_FROM_NAME
        value: Dossentry
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: relayoffice-mysql
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        fromService:
          type: pserv
          name: relayoffice-mysql
          envVarKey: MYSQL_DATABASE
      - key: DB_USERNAME
        fromService:
          type: pserv
          name: relayoffice-mysql
          envVarKey: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: relayoffice-mysql
          envVarKey: MYSQL_PASSWORD
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: QUEUE_CONNECTION
        value: sync
    disk:
      name: app-public-storage
      mountPath: /var/www/html/storage/app/public
      sizeGB: 5
