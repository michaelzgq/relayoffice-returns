name: dossentry-selfhosted

services:
  app:
    build:
      context: ./web-panel
      dockerfile: Dockerfile.render
    restart: unless-stopped
    env_file:
      - .env.self-hosted
    environment:
      PORT: 10000
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-8080}:10000"
    volumes:
      - app-storage:/var/www/html/storage

  mysql:
    image: mysql:8.0.45
    restart: unless-stopped
    env_file:
      - .env.self-hosted
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  setup:
    build:
      context: ./web-panel
      dockerfile: Dockerfile.render
    profiles: ["setup"]
    env_file:
      - .env.self-hosted
    environment:
      PORT: 10000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    command: ["/bin/bash", "-lc", "/usr/local/bin/selfhost-init.sh"]

volumes:
  app-storage:
  mysql-data:
